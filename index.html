<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BOSS STORE</title>

    <!-- Зависимости -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@300;400;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #050505;
            --accent: #00f2ff;
            --card: #111111;
            --text: #ffffff;
        }

        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            padding-bottom: 100px;
            overflow-x: hidden;
        }

        .font-orb { font-family: 'Orbitron', sans-serif; }

        /* Мгновенный лоадер */
        #loader {
            position: fixed; inset: 0; z-index: 9999;
            background: #000; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            transition: opacity 0.3s ease;
        }

        .boss-card {
            background: linear-gradient(135deg, #121212 0%, #000 100%);
            border: 1px solid rgba(0, 242, 255, 0.3);
            border-radius: 24px;
            padding: 20px;
            position: relative; overflow: hidden;
        }

        .progress-fill {
            height: 100%; background: var(--accent);
            box-shadow: 0 0 10px var(--accent);
            transition: width 1s ease;
        }

        .nav-bar {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px; background: rgba(15,15,15,0.8);
            backdrop-filter: blur(10px); border-radius: 20px;
            display: flex; justify-content: space-around; padding: 10px;
            border: 1px solid rgba(255,255,255,0.1); z-index: 1000;
        }

        .nav-item { color: #555; font-size: 20px; transition: 0.3s; }
        .nav-item.active { color: var(--accent); transform: translateY(-5px); }
              .view { display: none; animation: fadeIn 0.3s ease; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .btn-primary {
            background: var(--accent); color: #000;
            font-weight: 900; text-transform: uppercase;
            padding: 15px; border-radius: 15px; width: 100%;
            transition: 0.2s; border: none;
        }
        .btn-primary:active { transform: scale(0.98); opacity: 0.8; }

        /* Карточки игры */
        .game-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .card-slot {
            aspect-ratio: 2/3; background: #1a1a1a; border: 1px solid #333;
            border-radius: 10px; display: flex; align-items: center;
            justify-content: center; font-size: 24px; cursor: pointer;
        }
        .card-slot.flipped { background: var(--accent); color: #000; }
    </style>
</head>
<body>

    <!-- ЭКРАН ЗАГРУЗКИ -->
    <div id="loader">
        <div class="w-12 h-12 border-4 border-cyan-500 border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="font-orb text-xs tracking-widest text-cyan-500">BOSS STORE SYSTEM</p>
    </div>

    <!-- КОНТЕНТ -->
    <div class="px-4 pt-6">
        
        <header class="flex justify-between items-center mb-6">
            <div>
                <p id="greet" class="text-[10px] text-gray-500 uppercase font-bold">Добрый день</p>
                <h1 class="text-xl font-black font-orb uppercase">BOSS<span class="text-cyan-400">STORE</span></h1>
            </div>
            <div class="flex gap-3">
                <button onclick="UI.openModal('cart')" class="relative p-2 bg-white/5 rounded-xl border border-white/10">
                    🛒 <span id="cart-badge" class="absolute -top-1 -right-1 bg-red-500 text-[8px] w-4 h-4 rounded-full flex items-center justify-center hidden">0</span>
                </button>
            </div>
        </header>

        <!-- МАГАЗИН -->
        <div id="home" class="view active">
            <div class="boss-card mb-6">
                <div class="flex justify-between items-center mb-4">
                    <div>
                                              <span id="rank" class="text-[9px] bg-cyan-400 text-black px-2 py-0.5 rounded font-black uppercase">НОВИЧОК</span>
                        <h2 id="user-name" class="text-lg font-black font-orb mt-1">USER</h2>
                    </div>
                    <div id="user-avatar" class="w-12 h-12 rounded-full border-2 border-cyan-400 overflow-hidden bg-gray-800">
                        <img id="avatar-img" src="" class="w-full h-full object-cover">
                    </div>
                </div>
                <div class="space-y-1">
                    <div class="flex justify-between text-[10px] font-bold uppercase">
                        <span class="text-gray-500">Траты:</span>
                        <span id="user-spent" class="text-cyan-400">0.00 ₽</span>
                    </div>
                    <div class="w-full h-1.5 bg-white/10 rounded-full overflow-hidden">
                        <div id="user-progress" class="progress-fill" style="width: 0%"></div>
                    </div>
                </div>
            </div>

            <!-- FLASH SALE -->
            <div class="bg-indigo-900/30 border border-indigo-500/30 p-4 rounded-2xl mb-6 flex justify-between items-center">
                <div>
                    <p class="text-[10px] font-black text-indigo-400 uppercase">Flash Sale -4%</p>
                    <p class="text-xs font-bold uppercase">Обновление через:</p>
                    </div>
                <div id="flash-timer" class="font-orb text-lg font-black text-indigo-400">00:00:00</div>
            </div>

            <div class="mb-4">
                <input type="text" id="search" oninput="App.renderProducts()" placeholder="Поиск услуг..." class="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-sm outline-none focus:border-cyan-400">
            </div>

            <div id="product-grid" class="grid grid-cols-2 gap-4">
                <!-- Товары -->
            </div>
        </div>

        <!-- ИГРА -->
        <div id="game" class="view text-center">
            <h2 class="text-xl font-black font-orb mb-2 mt-10">LUCKY CARD</h2>
            <p class="text-[10px] text-gray-500 mb-8 uppercase">Выиграй скидку 10%</p>
            <div class="game-grid max-w-[300px] mx-auto mb-6">
                <div class="card-slot" onclick="App.playGame(this)">?</div>
                <div class="card-slot" onclick="App.playGame(this)">?</div>
                <div class="card-slot" onclick="App.playGame(this)">?</div>
            </div>
            <p id="game-msg" class="text-[10px] font-bold uppercase text-gray-400">Жми на карту!</p>
        </div>

        <!-- ПРОФИЛЬ -->
        <div id="profile" class="view">
            <h2 class="text-xl font-black font-orb mb-6 text-center uppercase">Мой профиль</h2>
            <div class="bg-white/5 p-5 rounded-2xl border border-white/10 mb-4">
                <p class="text-[10px] text-gray-500 uppercase mb-2">Ваша реф-ссылка</p>
                <div id="ref-link" class="bg-black p-3 rounded-lg text-[10px] font-mono text-cyan-400 mb-3 break-all">...</div>
                <button onclick="App.copyRef()" class="btn-primary py-2 text-[10px]">Копировать</button>
            </div>
            <div id="history" class="space-y-2">
                <!-- История -->
            </div>
        </div>

        <!-- САППОРТ -->
        <div id="support" class="view text-center">
            <h2 class="text-xl font-black font-orb mb-10 mt-10 uppercase">Поддержка</h2>
            <div class="space-y-4">
                <a href="https://t.me/Boss_storesvzbot" class="block btn-primary">Связаться с нами</a>
                <a href="https://t.me/osnovabossstore" class="block bg-white/5 p-4 rounded-xl font-bold uppercase text-xs">Канал новостей</a>
            </div>
        </div>

    </div>

    <!-- НАВИГАЦИЯ -->
    <div class="nav-bar">
        <div onclick="UI.tab('home')" id="n-home" class="nav-item active">🏠</div>
        <div onclick="UI.tab('game')" id="n-game" class="nav-item">🎮</div>
        <div onclick="UI.tab('profile')" id="n-profile" class="nav-item">👤</div>
        <div onclick="UI.tab('support')" id="n-support" class="nav-item">💬</div>
    </div>

    <!-- МОДАЛКА ТОВАРА -->
    <div id="m-prod" class="fixed inset-0 bg-black/90 z-[2000] hidden flex items-center justify-center p-6">
        <div class="bg-zinc-900 w-full rounded-3xl p-6 border border-white/10">
            <div id="m-img" class="w-full h-40 rounded-2xl bg-cover bg-center mb-4"></div>
            <h3 id="m-title" class="font-orb font-black text-lg mb-2 uppercase">Название</h3>
            <p id="m-desc" class="text-xs text-gray-500 mb-4"></p>
            <input type="text" id="m-data" placeholder="Ссылка или Ник" class="w-full bg-black border border-white/10 rounded-xl p-3 text-sm mb-4 outline-none focus:border-cyan-400">
            <div class="flex gap-3">
                <button onclick="App.addToCart()" class="btn-primary">В корзину</button>
                <button onclick="UI.closeModal('m-prod')" class="bg-white/5px-4 rounded-xl">❌</button>
            </div>
        </div>
    </div>

    <!-- КОРЗИНА -->
    <div id="m-cart" class="fixed inset-0 bg-black z-[2000] hidden flex flex-col p-6">
        <div class="flex justify-between items-center mb-8">
            <h2 class="font-orb font-black text-2xl">КОРЗИНА</h2>
            <button onclick="UI.closeModal('m-cart')" class="text-gray-500 font-bold">ЗАКРЫТЬ</button>
        </div>
        <div id="cart-list" class="flex-1 space-y-4 overflow-y-auto"></div>
        <div class="pt-6">
            <div class="flex justify-between text-xl font-orb mb-4">
                <span>ИТОГО:</span>
                <span id="cart-total" class="text-cyan-400">0 ₽</span>
            </div>
            <button onclick="App.checkout()" class="btn-primary py-5">Оформить заказ</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const CONFIG = {
            sheet: 'https://docs.google.com/spreadsheets/d/1q9vPlWM9t934ACzIwbZU4_EDtvpJdfO09-jodyIi9Ew/export?format=csv',
            botToken: '8034420193:AAGv0wBrV8q8YWXmkVWIsc9Khp1QPMm3Sjg',
            adminChat: '7727345054'
        };

        // СОСТОЯНИЕ (Вместо Supabase - localStorage)
        let State = {
            user: tg.initDataUnsafe?.user || { id: 0, first_name: 'Boss', username: 'user' },
            profile: JSON.parse(localStorage.getItem('boss_profile')) || { spent: 0, history: [], lastGame: 0 },
            products: [],
            cart: [],
            selected: null
        };

        // ЗВУКИ (Минималистичный генератор)
        const playSound = (f) => {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const g = ctx.createGain();
            osc.frequency.value = f;
            g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.5);
            osc.connect(g); g.connect(ctx.destination);
            osc.start(); osc.stop(ctx.currentTime + 0.5);
        };

        const App = {
            async init() {
                tg.expand();
                tg.ready();
                
                // Убираем лоадер сразу
                setTimeout(() => {
                    document.getElementById('loader').style.opacity = '0';
                    setTimeout(() => document.getElementById('loader').style.display = 'none', 300);
                }, 500);

                this.loadProducts();
                this.updateUI();
                this.startTimer();
            },

            async loadProducts() {
                try {
                    const res = await fetch(CONFIG.sheet);
                    const csv = await res.text();
                    const lines = csv.split('\n').slice(1);
                    State.products = lines.map(l => {
                        const [cat, name, price, desc, img] = l.split(',');
                        return { cat, name, price: parseFloat(price), desc, img };
                    }).filter(p => p.name);
                    this.renderProducts();
                } catch (e) {
                    console.error("Ошибка загрузки товаров");
                }
            },

            renderProducts() {
                const grid = document.getElementById('product-grid');
                const query = document.getElementById('search').value.toLowerCase();
                const filtered = State.products.filter(p => p.name.toLowerCase().includes(query));
                
                grid.innerHTML = filtered.map(p => `
                    <div onclick="App.openProd('${p.name.replace(/'/g, "")}')" class="bg-white/5 border border-white/5 p-3 rounded-2xl">
                        <div class="h-24 bg-cover bg-center rounded-xl mb-2" style="background-image: url('${p.img}')"></div>
                        <p class="text-[10px] font-bold uppercase truncate">${p.name}</p>
                        <p class="text-xs font-orb text-cyan-400">${p.price} ₽</p>
                    </div>
                `).join('');
            },

            openProd(name) {
                const p = State.products.find(x => x.name.replace(/'/g, "") === name);
                State.selected = p;
                document.getElementById('m-title').innerText = p.name;
                document.getElementById('m-desc').innerText = p.desc;
                document.getElementById('m-img').style.backgroundImage = `url('${p.img}')`;
                UI.openModal('m-prod');
                playSound(400);
            },

            addToCart() {
                const data = document.getElementById('m-data').value;
                if(!data) return alert("Введите данные!");
                State.cart.push({...State.selected, data});
                UI.closeModal('m-prod');
                this.updateCartBadge();
                playSound(600);
            },

            updateCartBadge() {
                const b = document.getElementById('cart-badge');
                b.innerText = State.cart.length;
                b.classList.toggle('hidden', State.cart.length === 0);
            },

            updateUI() {
                document.getElementById('user-name').innerText = (State.user.first_name || 'BOSS').toUpperCase();
                document.getElementById('user-spent').innerText = State.profile.spent.toFixed(2) + ' ₽';
                document.getElementById('user-progress').style.width = Math.min(State.profile.spent / 1000, 100) + '%';
                document.getElementById('ref-link').innerText = `https://t.me/Boss_storesvzbot?start=${State.user.id}`;
                if(State.user.photo_url) document.getElementById('avatar-img').src = State.user.photo_url;
                
                const rank = State.profile.spent > 50000 ? 'БОСС' : State.profile.spent > 10000 ? 'VIP' : 'НОВИЧОК';
                document.getElementById('rank').innerText = rank;
                
                localStorage.setItem('boss_profile', JSON.stringify(State.profile));
            },

            checkout() {
                if(State.cart.length === 0) return;
                const total = State.cart.reduce((s, i) => s + i.price, 0);
                
                // Имитация заказа
                const msg = `📦 НОВЫЙ ЗАКАЗ: ${State.user.username}\nСумма: ${total} ₽\nТоваров: ${State.cart.length}`;
                fetch(`https://api.telegram.org/bot${CONFIG.botToken}/sendMessage?chat_id=${CONFIG.adminChat}&text=${encodeURIComponent(msg)}`);
                
                State.profile.spent += total;
                State.profile.history.push(...State.cart);
                State.cart = [];
                this.updateUI();
                this.updateCartBadge();
                UI.closeModal('m-cart');
                confetti();
                playSound(200);
                alert("Заказ оформлен! Ожидайте сообщения от админа.");
            },

            playGame(el) {
                const now = Date.now();
                if(now - State.profile.lastGame < 86400000) {
                    document.getElementById('game-msg').innerText = "Приходите завтра!";
                    return;
                }
                
                el.classList.add('flipped');
                const win = Math.random() > 0.5;
                el.innerText = win ? "10%" : "❌";
                State.profile.lastGame = now;
                this.updateUI();
              if(win) {
                    confetti();
                    document.getElementById('game-msg').innerText = "Вы выиграли скидку 10%!";
                } else {
                    document.getElementById('game-msg').innerText = "Повезет в следующий раз!";
                }
            },

            startTimer() {
                setInterval(() => {
                    const now = new Date();
                    const left = 3600 - (now.getMinutes() * 60 + now.getSeconds());
                    const m = Math.floor(left / 60);
                    const s = left % 60;
                    document.getElementById('flash-timer').innerText = `00:${m < 10 ? '0'+m : m}:${s < 10 ? '0'+s : s}`;
                }, 1000);
            },

            copyRef() {
                navigator.clipboard.writeText(document.getElementById('ref-link').innerText);
                alert("Скопировано!");
            }
        };

        const UI = {
            tab(id) {
                document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
                document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                document.getElementById(id).classList.add('active');
                document.getElementById('n-' + id).classList.add('active');
                playSound(500);
            },
            openModal(id) {
                document.getElementById(id).classList.remove('hidden');
                if(id === 'm-cart') this.renderCart();
            },
            closeModal(id) { document.getElementById(id).classList.add('hidden'); },
            renderCart() {
                const list = document.getElementById('cart-list');
                list.innerHTML = State.cart.map((i, idx) => `
                    <div class="flex justify-between items-center bg-white/5 p-4 rounded-xl">
                        <div>
                            <p class="text-xs font-bold">${i.name}</p>
                            <p class="text-[10px] text-gray-500">${i.price} ₽</p>
                        </div>
                        <button onclick="State.cart.splice(${idx},1); UI.renderCart(); App.updateCartBadge();" class="text-red-500">❌</button>
                    </div>
                `).join('');
                document.getElementById('cart-total').innerText = State.cart.reduce((s, i) => s + i.price, 0) + ' ₽';
            }
        };

        window.onload = () => App.init();
    </script>
</body>
</html>

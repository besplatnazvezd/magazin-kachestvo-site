<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BOSS STORE</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root[data-theme="dark"] { --bg: #0a0a0c; --card: #16161a; --text: #ffffff; --accent: #00f2ff; --sec: #ff007f; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; }
        .card { background: var(--card); border: 1px solid rgba(255,255,255,0.1); }
        .page { display: none; }
        .page.active { display: block; }
        .nav-active { color: var(--accent); }
    </style>
</head>
<body class="pb-24">

    <!-- HEADER -->
    <header class="p-5 flex justify-between items-center">
        <div>
            <p id="greeting" class="text-[10px] text-gray-500 uppercase">Загрузка...</p>
            <h1 class="text-2xl font-black">BOSS STORE</h1>
        </div>
        <button onclick="toggleTheme()">🌙/☀️</button>
    </header>

    <!-- CONTENT -->
    <main id="app" class="px-5">
        <!-- ГЛАВНАЯ -->
        <section id="home" class="page active">
            <div class="card p-6 rounded-3xl mb-6" onclick="secretTrigger()">
                <h2 id="user-title" class="text-xl font-bold">НОВИЧОК</h2>
                <div class="w-full bg-gray-800 h-2 rounded mt-2"><div id="xp-bar" class="bg-cyan-400 h-full w-[0%] transition-all"></div></div>
            </div>
            <div id="catalog" class="grid grid-cols-2 gap-4"></div>
        </section>

        <!-- ИГРА КАРТОЧКИ -->
        <section id="game" class="page text-center">
            <h2 class="text-2xl font-bold mb-6">УГАДАЙ КАРТУ</h2>
            <div id="game-grid" class="flex justify-center gap-4">
                <div onclick="playCard(0)" class="w-24 h-32 card rounded-2xl flex items-center justify-center text-3xl cursor-pointer">?</div>
                <div onclick="playCard(1)" class="w-24 h-32 card rounded-2xl flex items-center justify-center text-3xl cursor-pointer">?</div>
                <div onclick="playCard(2)" class="w-24 h-32 card rounded-2xl flex items-center justify-center text-3xl cursor-pointer">?</div>
            </div>
                        <p id="game-msg" class="mt-6 text-sm"></p>
        </section>

        <!-- ЛИДЕРБОРДЫ И ПОКУПКИ -->
        <section id="profile" class="page">
            <div class="grid grid-cols-2 gap-4 mb-6">
                <div class="card p-4 rounded-2xl">Топ Рефералов <div id="ref-lb"></div></div>
                <div class="card p-4 rounded-2xl">Топ Трат <div id="spent-lb"></div></div>
            </div>
            <h3 class="font-bold mb-2">Мои покупки</h3>
            <div id="history-list"></div>
        </section>
    </main>

    <!-- NAV -->
    <nav class="fixed bottom-0 w-full p-4 bg-black flex justify-around">
        <button onclick="showPage('home')">Shop</button>
        <button onclick="showPage('game')">Game</button>
        <button onclick="showPage('profile')">Profile</button>
    </nav>

    <script>
        const BOT_TOKEN = '8034420193:AAGv0wBrV8q8YWXmkVWIsc9Khp1QPMm3Sjg';
        const ADMIN_ID = '7727345054';
        let state = { spent: 0, cart: [], orders: [] };

        window.onload = async () => {
            const user = Telegram.WebApp.initDataUnsafe.user || { first_name: 'Гость', id: 123 };
            document.getElementById('greeting').innerText = `Привет, ${user.first_name}!`;
            loadData();
        };

        async function loadData() {
            const res = await fetch('https://docs.google.com/spreadsheets/d/1q9vPlWM9t934ACzIwbZU4_EDtvpJdfO09-jodyIi9Ew/export?format=csv');
            const csv = await res.text();
            // Тут парсинг CSV и отрисовка товаров в #catalog
        }

        function playCard(choice) {
            const lastPlay = localStorage.getItem('lastPlay');
            if (lastPlay && Date.now() - lastPlay < 86400000) return alert("Попробуй завтра!");
            
            const win = Math.random() < 0.1;
            document.getElementById('game-msg').innerText = win ? "Выигрыш! 10% скидка!" : "Проигрыш!";
            localStorage.setItem('lastPlay', Date.now());
        }

        async function checkout(product) {
            const user = Telegram.WebApp.initDataUnsafe.user;
            const text = `Заказ: ${product.name}\nКлиент: @${user.username}\nID: ${user.id}\nДанные: ${document.getElementById('user-msg').value}`;
            
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ chat_id: ADMIN_ID, text: text })
            });
            alert("Заказ отправлен!");
        }

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function toggleTheme() {
            document.documentElement.setAttribute('data-theme', document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
        }

        function secretTrigger() { if(confirm("Секретный раздел?")) alert("Тут пусто..."); }
    </script>
</body>
</html>

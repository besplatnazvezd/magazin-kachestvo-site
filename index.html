<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BOSS NEURAL OS v.3100</title>

    <!-- СИСТЕМНЫЕ СРЕДСТВА -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@300;500;800&family=Syncopate:wght@700&display=swap" rel="stylesheet">

    <style>
        /* НЕОНОВАЯ ПЕРЕМЕННАЯ ПАЛИТРА ДЛЯ ДВУХ ТЕМ */
        :root[data-theme="dark"] {
            --bg: #030008;
            --panel: rgba(13, 8, 24, 0.85);
            --accent: #00f2ff;
            --secondary: #ff007f;
            --text-main: #ffffff;
            --text-dim: #8b829e;
            --border: rgba(0, 242, 255, 0.2);
            --border-active: rgba(255, 0, 127, 0.5);
            --card-bg: rgba(20, 10, 35, 0.6);
            --grid-color: rgba(0, 242, 255, 0.1);
            --neon-shadow: rgba(0, 242, 255, 0.25);
        }

        :root[data-theme="light"] {
            --bg: #f5f7fb;
            --panel: rgba(255, 255, 255, 0.9);
            --accent: #0055ff;
            --secondary: #e10075;
            --text-main: #0f172a;
            --text-dim: #64748b;
            --border: rgba(0, 85, 255, 0.15);
            --border-active: rgba(225, 0, 117, 0.4);
            --card-bg: rgba(255, 255, 255, 0.95);
            --grid-color: rgba(0, 85, 255, 0.05);
            --neon-shadow: rgba(0, 85, 255, 0.15);
        }

        body {
            font-family: 'JetBrains Mono', monospace;
            background: var(--bg);
            color: var(--text-main);
            overflow-x: hidden;
            transition: background 0.4s ease, color 0.4s ease;
            -webkit-tap-highlight-color: transparent;
        }

        /* КИБЕРНЕТИЧЕСКАЯ СЕТКА */
        .cyber-grid {
            position: fixed; inset: 0; z-index: -1;
            background-image: 
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 40px 40px;
            mask-image: radial-gradient(circle at 50% 50%, black, transparent 90%);
                      transform: perspective(600px) rotateX(55deg) translateY(-15%);
            animation: gridMove 25s linear infinite;
        }

        @keyframes gridMove { from { background-position: 0 0; } to { background-position: 0 800px; } }

        /* СТЕКЛЯННЫЕ ПАНЕЛИ */
        .glass-card {
            background: var(--panel);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid var(--border);
            border-radius: 28px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        /* КАТЕГОРИИ В СТИЛЕ КИБЕРПАНК */
        .cat-btn {
            padding: 12px 22px; 
            font-size: 10px; 
            font-weight: 900; 
            letter-spacing: 2px;
            text-transform: uppercase; 
            border-radius: 14px; 
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            background: var(--card-bg); 
            border: 2px solid var(--border); 
            color: var(--text-dim);
            position: relative;
            overflow: hidden;
        }
        .cat-btn.active {
            background: linear-gradient(135deg, var(--accent), var(--secondary));
            color: #fff; 
            border-color: transparent;
            box-shadow: 0 0 20px var(--neon-shadow);
            transform: translateY(-2px);
        }

        /* КАРТОЧКА ТОВАРА */
        .product-node {
            background: var(--card-bg);
            border: 1px solid var(--border); 
            border-radius: 28px;
            transition: all 0.3s ease;
        }
        .product-node:active { 
            transform: scale(0.97); 
            border-color: var(--secondary); 
            box-shadow: 0 0 20px var(--neon-shadow);
        }

        .page { display: none; animation: fadeIn 0.4s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

        /* МЕНЮ НАВИГАЦИИ */
        .nav-dock {
            position: fixed; bottom: 25px; left: 20px; right: 20px;
            background: var(--panel); backdrop-filter: blur(20px);
            border-radius: 24px; border: 1px solid var(--border);
            display: flex; justify-content: space-around; padding: 10px; z-index: 1000;
        }
        .nav-link { 
            padding: 12px; border-radius: 18px; color: var(--text-dim); transition: 0.3s;
        }
        .nav-link.active { 
            color: var(--accent); 
            background: rgba(0, 242, 255, 0.1); 
            box-shadow: 0 0 15px var(--neon-shadow); 
        }

        ::-webkit-scrollbar { display: none; }
        .font-orb { font-family: 'Orbitron', sans-serif; }
    </style>
</head>
<body>

    <div class="cyber-grid"></div>

    <header class="p-6 sticky top-0 z-[100] backdrop-blur-md">
        <div class="flex justify-between items-center">
            <div>
                <p class="text-[8px] font-black tracking-[4px] text-pink-500 mb-1 font-orb uppercase">Neural Protocol v.3100</p>
                <h1 id="user-name" class="text-2xl font-black font-orb bg-clip-text text-transparent bg-gradient-to-r from-cyan-400 via-pink-500 to-purple-500">ADMIN</h1>
            </div>
            <div class="flex gap-2">
                <!-- ТЕМА СВЕТЛАЯ / ТЕМНАЯ -->
                <button onclick="toggleTheme()" class="glass-card w-10 h-10 flex items-center justify-center">
                    <svg id="theme-icon" class="w-5 h-5 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m0-12.728l.707.707m12.728 12.728l.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z"/>
                    </svg>
                </button>
                <button onclick="toggleLang()" id="lang-btn" class="glass-card px-4 py-2 text-[10px] font-black text-cyan-400">RU</button>
            </div>
        </div>
    </header>

    <main class="px-6 pb-40">
        <!-- КАТАЛОГ -->
        <section id="page-home" class="page active">
            <div class="relative mb-8">
                <input type="text" id="search" placeholder="SEARCH DATABASE..." class="w-full bg-white/5 border border-cyan-500/30 rounded-2xl py-5 px-6 text-xs font-mono outline-none focus:border-cyan-400 transition-all shadow-2xl text-white">
            </div>

            <!-- КАТЕГОРИИ -->
            <div id="categories" class="flex gap-3 overflow-x-auto no-scrollbar mb-8 pb-1"></div>
            
            <div id="catalog" class="grid grid-cols-1 gap-5">
                <div class="h-32 glass-card animate-pulse"></div>
                <div class="h-32 glass-card animate-pulse"></div>
            </div>
        </section>

        <!-- НЕЙРО-СЕТЬ -->
        <section id="page-ref" class="page">
            <div class="glass-card p-8 text-center mb-6 border-cyan-500/40">
                <div class="w-20 h-20 bg-gradient-to-tr from-cyan-400 to-purple-600 rounded-3xl flex items-center justify-center mx-auto mb-6 shadow-2xl">
                    <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                </div>
                <h2 class="text-2xl font-black font-orb mb-2">НЕЙРО-СЕТЬ</h2>
                <p class="text-[10px] text-pink-500 uppercase tracking-widest mb-8 font-black">3% за каждого юнита</p>
                
                <div class="bg-black/40 p-5 rounded-2xl border border-white/5 mb-6 font-mono text-[10px] text-cyan-300 break-all" id="ref-link">
                    Загрузка линка...
                </div>
                
                <button onclick="copyRef()" class="w-full bg-gradient-to-r from-cyan-400 to-blue-500 text-black py-5 rounded-2xl font-black text-[11px] uppercase tracking-widest shadow-lg active:scale-95 transition-all">Копировать линк</button>
            </div>

            <div class="glass-card p-6">
                <h3 class="text-xs font-black font-orb mb-6 text-cyan-400 tracking-[3px] uppercase">Топ Рефералов</h3>
                <div id="leaderboard"></div>
            </div>
        </section>

        <!-- ИНФО-ЦЕНТР (FAQ и Контакты) -->
        <section id="page-faq" class="page">
            <h2 class="text-2xl font-black font-orb mb-8 tracking-tighter">ИНФО-ЦЕНТР</h2>
            <div id="faq-list" class="space-y-4 mb-10"></div>
            
            <div class="glass-card p-8 border-purple-500/30">
                <p class="text-[9px] font-black uppercase tracking-[4px] text-center text-gray-400 mb-8">Связь с Администратором</p>
                <div class="grid grid-cols-1 gap-4">
                    <button onclick="window.open('https://t.me/nmproda')" class="flex items-center justify-center gap-4 bg-white/5 py-5 rounded-2xl border border-cyan-500/30 text-cyan-400 font-black text-xs uppercase tracking-widest hover:bg-cyan-500/10 transition-all">
                        Telegram Support
                    </button>
                    <button id="email-action" class="flex items-center justify-center gap-4 bg-white/5 py-5 rounded-2xl border border-purple-500/30 text-purple-400 font-black text-xs uppercase tracking-widest hover:bg-purple-500/10 transition-all">
                        Email Support
                    </button>
                </div>
            </div>
        </section>

        <!-- КОРЗИНА -->
        <section id="page-cart" class="page">
            <div id="cart-list" class="space-y-4 mb-8"></div>
            <div id="cart-empty" class="py-20 text-center opacity-30 font-orb text-xs uppercase tracking-[10px]">Пусто</div>
            
            <div id="cart-summary" class="hidden glass-card p-8">
                <div class="flex justify-between items-end mb-8">
                    <span class="text-xs text-gray-400 font-bold">ИТОГО</span>
                    <span id="total-price" class="text-4xl font-black font-orb text-cyan-400">0</span>
                </div>
                
                <!-- ВВОД ДАННЫХ + ПОЖЕЛАНИЙ -->
                <div class="space-y-4 mb-8">
                    <input type="text" id="order-contact" placeholder="@username или Email" class="w-full bg-black/40 border border-white/10 p-5 rounded-2xl text-xs outline-none focus:border-cyan-400 text-white font-mono">
                    <textarea id="order-wishes" placeholder="Ваши уточнения и пожелания к заказу..." class="w-full bg-black/40 border border-white/10 p-5 rounded-2xl text-xs outline-none focus:border-cyan-400 text-white font-mono h-28 resize-none"></textarea>
                </div>

                <button onclick="checkout()" class="w-full bg-white text-black py-6 rounded-2xl font-black text-xs uppercase tracking-widest shadow-2xl active:scale-95 transition-all">Оплатить заказ</button>
            </div>
        </section>
    </main>

    <!-- МОДАЛКА ТОВАРА -->
    <div id="modal" class="fixed inset-0 z-[200] hidden flex items-end justify-center p-4 bg-black/80 backdrop-blur-xl">
        <div class="w-full max-w-lg glass-card p-8 mb-20">
            <img id="modal-img" class="w-full h-48 object-cover rounded-3xl mb-6 shadow-2xl" onerror="this.src='https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=500'">
            <h2 id="modal-title" class="text-2xl font-black font-orb mb-2 text-cyan-400 uppercase"></h2>
            <p id="modal-desc" class="text-xs text-gray-400 mb-8 leading-relaxed font-mono"></p>
            <div class="flex items-center justify-between gap-4">
                <div id="modal-price" class="text-2xl font-black font-orb"></div>
                <button onclick="addToCart()" class="bg-cyan-400 text-black px-8 py-5 rounded-2xl font-black text-xs uppercase tracking-tighter">В КОРЗИНУ</button>
            </div>
            <button onclick="closeModal()" class="w-full mt-6 py-2 text-[10px] text-gray-500 font-bold uppercase tracking-widest">Закрыть</button>
        </div>
    </div>

    <!-- МЕНЮ -->
    <nav class="nav-dock">
        <button onclick="switchPage('home')" id="nav-home" class="nav-link active"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/></svg></button>
        <button onclick="switchPage('ref')" id="nav-ref" class="nav-link"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a44 0 11-8 0 4 4 0 018 0z"/></svg></button>
        <button onclick="switchPage('faq')" id="nav-faq" class="nav-link"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg></button>
        <button onclick="switchPage('cart')" id="nav-cart" class="nav-link relative"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg><span id="cart-dot" class="absolute top-2 right-2 w-2 h-2 bg-pink-500 rounded-full hidden"></span></button>
    </nav>

    <script>
        /***********************************************************
         * 1. ВСТАВЬТЕ СЮДА ВАШУ ССЫЛКУ НА ПОЧТУ ДЛЯ КНОПКИ EMAIL *
         ***********************************************************/
        const MY_EMAIL_LINK = 'mailto:supportnmproda@gmail.com'; 

        const VAULT = {
            CSV: 'https://docs.google.com/spreadsheets/d/1q9vPlWM9t934ACzIwbZU4_EDtvpJdfO09-jodyIi9Ew/export?format=csv',
            ADMIN_CHAT: 'https://t.me/nmproda',
            BOT_ID: 'Boss_storesvzbot', // Исправленный юзернейм твоего бота
            LANG: 'RU',
            THEME: 'dark'
        };

        const FAQ_DATA = [
            { q: "Как я получу товар?", a: "После оплаты услуга/товар придет в ваш Telegram или Email, по завершению заказа." },
            { q: "Безопасно ли это?", a: "Мы используем официальный шлюз ЮKassa. Ваши данные защищены." },
            { q: "Можно ли сделать возврат?", a: "Да, если возникла техническая неполадка до активации продукта." }
        ];

        let refStats = JSON.parse(localStorage.getItem('ref_stats')) || { count: 0, rank: 128 };
        const MOCK_LEADERBOARD = [
            { name: "CyberKing", count: 42 },
            { name: "Neo_Admin", count: 38 },
            { name: "Z-Quantum", count: 27 },
            { name: "User_772", count: 19 },
            { name: "TechnoMage", count: 12 }
        ];

        const tg = window.Telegram.WebApp;
        let items = [], cart = [], activeCat = 'Все';

        window.onload = () => {
            tg.expand();
            document.getElementById('user-name').innerText = (tg.initDataUnsafe?.user?.first_name || 'ADMIN').toUpperCase();
            document.getElementById('ref-link').innerText = `https://t.me/${VAULT.BOT_ID}?start=${tg.initDataUnsafe?.user?.id || '7727345054'}`;
            document.getElementById('email-action').onclick = () => window.location.href = MY_EMAIL_LINK;
            
            initData();
            renderFAQ();
            renderLeaderboard();
        };

        async function initData() {
            try {
                const url = VAULT.CSV.trim().replace(/[\u200B-\u200D\uFEFF]/g, "");
                const res = await fetch(url);
                const text = await res.text();
                const lines = text.split(/\r?\n/).filter(l => l.trim()).slice(1);
                
                items = lines.map(line => {
                    const cols = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    return {
                        cat: cols[0]?.replace(/"/g, '').trim(),
                        name: cols[1]?.replace(/"/g, '').trim(),
                        price: parseFloat(cols[2]),
                        desc: cols[3]?.replace(/"/g, '').trim(),
                      img: cols[4]?.replace(/"/g, '').trim()
                    };
                }).filter(i => i.name && !isNaN(i.price));

                renderCats();
                renderItems(items);
            } catch (err) {
                console.error("CSV Sync Failed", err);
            }
        }

        function renderCats() {
            const cats = ['Все', ...new Set(items.map(i => i.cat).filter(Boolean))];
            document.getElementById('categories').innerHTML = cats.map(c => `
                <button onclick="filterCat('${c}')" class="cat-btn ${activeCat === c ? 'active' : ''}">${c}</button>
            `).join('');
        }

        function renderItems(data) {
            document.getElementById('catalog').innerHTML = data.map(i => `
                <div onclick="openItem('${i.name}')" class="product-node p-5 flex items-center gap-5">
                    <img src="${i.img}" class="w-20 h-20 object-cover rounded-2xl shadow-xl" onerror="this.src='https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=150'">
                    <div class="flex-1">
                        <p class="text-[7px] text-pink-500 font-black font-orb uppercase mb-1">${i.cat}</p>
                        <h3 class="text-sm font-black uppercase text-white/95">${i.name}</h3>
                        <p class="text-lg font-black font-orb text-cyan-400 mt-2">${i.price.toLocaleString()}</p>
                    </div>
                </div>
            `).join('');
        }

        function filterCat(c) {
            activeCat = c;
            renderCats();
            renderItems(c === 'Все' ? items : items.filter(i => i.cat === c));
            tg.HapticFeedback.impactOccurred('medium');
        }

        function openItem(name) {
            const it = items.find(x => x.name === name);
            stateSelected = it;
            document.getElementById('modal-title').innerText = it.name;
            document.getElementById('modal-img').src = it.img;
            document.getElementById('modal-desc').innerText = it.desc;
            document.getElementById('modal-price').innerText = it.price.toLocaleString();
            document.getElementById('modal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('modal').classList.add('hidden'); }

        function addToCart() {
            cart.push(stateSelected);
            updateCart();
            closeModal();
            tg.HapticFeedback.notificationOccurred('success');
        }

        function updateCart() {
            const list = document.getElementById('cart-list');
            const summary = document.getElementById('cart-summary');
            const empty = document.getElementById('cart-empty');
            const dot = document.getElementById('cart-dot');

            if(cart.length > 0) {
                list.innerHTML = cart.map((it, i) => `
                    <div class="glass-card p-5 flex items-center justify-between">
                        <div class="flex items-center gap-4">
                            <img src="${it.img}" class="w-10 h-10 rounded-lg" onerror="this.src='https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=100'">
                            <span class="text-[10px] font-black uppercase font-orb">${it.name}</span>
                        </div>
                        <button onclick="removeFromCart(${i})" class="text-rose-500 text-[10px] font-black uppercase">Del</button>
                    </div>
                `).join('');
                let total = cart.reduce((s, i) => s + i.price, 0);
                document.getElementById('total-price').innerText = total.toLocaleString();
                summary.classList.remove('hidden'); empty.classList.add('hidden'); dot.classList.remove('hidden');
            } else {
                summary.classList.add('hidden'); empty.classList.remove('hidden'); dot.classList.add('hidden');
            }
        }

        function removeFromCart(i) { cart.splice(i, 1); updateCart(); }

        function switchPage(p) {
            document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
            document.getElementById('page-' + p).classList.add('active');
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById('nav-' + p).classList.add('active');
            tg.HapticFeedback.impactOccurred('light');
        }

        function renderLeaderboard() {
            const board = document.getElementById('leaderboard');
            const list = [...MOCK_LEADERBOARD, { name: "YOU (Admin)", count: refStats.count }].sort((a,b) => b.count - a.count);
            board.innerHTML = list.map((u, i) => `
                <div class="flex items-center gap-4 p-4 bg-white/5 border border-white/5 rounded-xl mb-2">
                    <div class="w-6 h-6 rounded-full bg-cyan-400 text-black font-black flex items-center justify-center text-[10px]">${i+1}</div>
                    <div class="flex-1 text-[10px] font-bold uppercase">${u.name}</div>
                    <div class="text-[10px] font-black text-cyan-400 font-orb">${u.count} UNITS</div>
                </div>
            `).join('');
        }

        function renderFAQ() {
            document.getElementById('faq-list').innerHTML = FAQ_DATA.map(f => `
                <div class="glass-card p-6" onclick="this.querySelector('p').classList.toggle('hidden')">
                    <div class="flex justify-between items-center text-[10px] font-black uppercase font-orb">
                        <span>${f.q}</span>
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
                    </div>
                    <p class="mt-4 text-[10px] text-gray-400 leading-relaxed hidden border-t border-white/5 pt-4 font-mono">${f.a}</p>
                </div>
            `).join('');
        }

        /* ОФОРМЛЕНИЕ ЗАКАЗА С УТОЧНЕНИЯМИ */
        function checkout() {
            const contact = document.getElementById('order-contact').value;
            const wishes = document.getElementById('order-wishes').value || 'Нет уточнений';
            
            if(!contact) return tg.showAlert("Укажите контактные данные!");
            
            tg.showConfirm("Подтвердить оплату и отправить данные?", (ok) => {
                if(ok) {
                    confetti({ particleCount: 200, spread: 70, colors: ['#00f2ff', '#ff007f'] });
                    
                    const msg = `🛒 НОВЫЙ ЗАКАЗ\n👤 Клиент: @${tg.initDataUnsafe?.user?.username || 'anon'}\n💰 Сумма: ${document.getElementById('total-price').innerText} руб.\n📍 Контакт: ${contact}\n📝 Пожелания/Уточнения: ${wishes}\n📦 Позиции:\n` + cart.map(i => `- ${i.name}`).join('\n');
                    
                    tg.sendData(JSON.stringify({ message: msg }));
                    
                    setTimeout(() => window.location.href = VAULT.ADMIN_CHAT, 1500);
                }
            });
        }

        function copyRef() {
            const link = document.getElementById('ref-link').innerText;
            navigator.clipboard.writeText(link);
            tg.showAlert("Ссылка скопирована!");
            tg.HapticFeedback.notificationOccurred('success');
        }

        function toggleTheme() {
            VAULT.THEME = VAULT.THEME === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', VAULT.THEME);
            
            const icon = document.getElementById('theme-icon');
            if(VAULT.THEME === 'light') {
                icon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>`;
            } else {
                icon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m0-12.728l.707.707m12.728 12.728l.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z"/>`;
            }
            tg.HapticFeedback.selectionChanged();
        }

        function toggleLang() {
            VAULT.LANG = VAULT.LANG === 'RU' ? 'EN' : 'RU';
            document.getElementById('lang-btn').innerText = VAULT.LANG;
            tg.HapticFeedback.selectionChanged();
        }

        document.getElementById('search').oninput = (e) => {
            const v = e.target.value.toLowerCase();
            renderItems(items.filter(i => i.name.toLowerCase().includes(v)));
        };

    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BOSS NEURAL OS v.4000</title>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@400;800&display=swap" rel="stylesheet">

    <style>
        :root[data-theme="dark"] {
            --bg: #050508;
            --card: rgba(20, 20, 30, 0.7);
            --text: #ffffff;
            --accent: #00f2ff;
            --secondary: #ff007f;
            --border: rgba(0, 242, 255, 0.2);
            --grid: rgba(0, 242, 255, 0.05);
        }

        :root[data-theme="light"] {
            --bg: #f0f4f8;
            --card: rgba(255, 255, 255, 0.9);
            --text: #1a1a2e;
            --accent: #0066ff;
            --secondary: #d10069;
            --border: rgba(0, 102, 255, 0.2);
            --grid: rgba(0, 102, 255, 0.05);
        }

        body {
            font-family: 'JetBrains Mono', monospace;
            background: var(--bg);
            color: var(--text);
            transition: all 0.3s ease;
            user-select: none;
        }

        .cyber-grid {
            position: fixed; inset: 0; z-index: -1;
            background-image: linear-gradient(var(--grid) 1px, transparent 1px), linear-gradient(90deg, var(--grid) 1px, transparent 1px);
            background-size: 30px 30px;
            mask-image: radial-gradient(circle at 50% 50%, black, transparent 90%);
        }

        /* КАТЕГОРИИ: НОВЫЙ ДИЗАЙН */
        .category-container {
            display: flex; gap: 12px; overflow-x: auto; padding-bottom: 15px; scrollbar-width: none;
        }
        .category-container::-webkit-scrollbar { display: none; }

        .cat-chip {
            flex: 0 0 auto;
            padding: 14px 28px;
            border-radius: 20px;
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text);
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            white-space: nowrap;
                      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .cat-chip.active {
            background: linear-gradient(135deg, var(--accent), var(--secondary));
            border-color: transparent;
            color: white;
            box-shadow: 0 5px 20px rgba(0, 242, 255, 0.3);
            transform: translateY(-2px);
        }

        /* КАРТОЧКА ТОВАРА */
        .product-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 30px;
            overflow: hidden;
            transition: 0.3s;
        }
        .product-card:active { transform: scale(0.96); border-color: var(--secondary); }

        .glass { backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }

        .nav-bar {
            position: fixed; bottom: 20px; left: 20px; right: 20px;
            background: var(--card); border: 1px solid var(--border);
            border-radius: 25px; display: flex; justify-content: space-around; padding: 10px; z-index: 1000;
        }
        .nav-btn { color: #666; padding: 10px; transition: 0.3s; }
        .nav-btn.active { color: var(--accent); filter: drop-shadow(0 0 8px var(--accent)); }

        .page { display: none; animation: slideUp 0.4s ease-out; }
        .page.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .font-orb { font-family: 'Orbitron', sans-serif; }
    </style>
</head>
<body>

    <div class="cyber-grid"></div>

    <header class="p-6 sticky top-0 z-[100] glass">
        <div class="flex justify-between items-center">
            <div>
                <p class="text-[8px] font-bold tracking-[4px] text-pink-500 mb-1 font-orb">SYSTEM ACTIVE</p>
                <h1 id="user-display" class="text-2xl font-black font-orb bg-clip-text text-transparent bg-gradient-to-r from-cyan-400 to-purple-500">ADMIN</h1>
            </div>
            <div class="flex gap-3">
                <button onclick="toggleTheme()" class="w-10 h-10 rounded-2xl border border-white/10 flex items-center justify-center bg-white/5">
                                      <svg id="theme-icon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m0-12.728l.707.707m12.728 12.728l.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z"/></svg>
                </button>
                <button onclick="toggleLang()" id="lang-btn" class="px-4 py-2 rounded-2xl border border-white/10 text-[10px] font-black font-orb bg-white/5">RU</button>
            </div>
        </div>
    </header>

    <main class="px-6 pb-40">
        <!-- ГЛАВНАЯ -->
        <section id="page-home" class="page active">
            <div class="mb-8">
                <input type="text" id="search" placeholder="Поиск в базе данных..." class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 px-6 text-sm font-mono outline-none focus:border-cyan-400 transition-all">
            </div>

            <div id="categories" class="category-container mb-8"></div>
            
            <div id="catalog" class="grid grid-cols-1 gap-5"></div>
        </section>

        <!-- НЕЙРО-СЕТЬ -->
        <section id="page-ref" class="page">
            <div class="product-card p-8 text-center mb-6">
                <div class="w-16 h-16 bg-gradient-to-br from-cyan-400 to-pink-500 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-xl">
                    <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                </div>
                <h2 class="text-xl font-black font-orb mb-2">НЕЙРО-СЕТЬ</h2>
                <p class="text-[10px] text-gray-500 uppercase tracking-[3px] mb-8">Зарабатывай 3% с юнитов</p>
                <div id="ref-link-box" class="bg-black/30 p-4 rounded-xl border border-white/5 mb-6 text-[10px] font-mono text-cyan-400 break-all select-all">Loading...</div>
                <button onclick="copyRef()" class="w-full bg-cyan-400 text-black py-4 rounded-xl font-black text-xs uppercase tracking-widest active:scale-95 transition-all">Копировать ссылку</button>
            </div>

            <div class="product-card p-6">
                <h3 class="text-xs font-black font-orb mb-6 text-gray-400 uppercase tracking-widest">Топ Лидеров</h3>
                <div id="leaderboard"></div>
            </div>
        </section>

        <!-- FAQ / КОНТАКТЫ -->
        <section id="page-faq" class="page">
            <h2 class="text-2xl font-black font-orb mb-8">ИНФО-ЦЕНТР</h2>
            <div id="faq-list" class="space-y-4 mb-10"></div>
            
            <div class="product-card p-8">
                <p class="text-[10px] font-bold uppercase tracking-[3px] text-center text-gray-500 mb-8">Прямая связь</p>
                <div class="grid grid-cols-1 gap-4">
                    <button onclick="window.open('https://t.me/nmproda')" class="flex items-center justify-center gap-3 bg-white/5 py-5 rounded-2xl border border-white/10 text-cyan-400 font-black text-xs uppercase tracking-widest">
                        Telegram Support
                    </button>
                    <button id="email-btn" class="flex items-center justify-center gap-3 bg-white/5 py-5 rounded-2xl border border-white/10 text-pink-500 font-black text-xs uppercase tracking-widest">
                        Email Support
                    </button>
                </div>
            </div>
        </section>

        <!-- КОРЗИНА -->
        <section id="page-cart" class="page">
            <div id="cart-list" class="space-y-4 mb-8"></div>
            <div id="cart-empty" class="py-20 text-center opacity-20 font-orb text-xs uppercase tracking-[10px]">Корзина пуста</div>
            
            <div id="cart-footer" class="hidden product-card p-8">
                <div class="flex justify-between items-end mb-8">
                    <span class="text-xs text-gray-500 font-bold uppercase">Итого</span>
                    <span id="total-price" class="text-4xl font-black font-orb text-cyan-400">0</span>
                </div>
                <div class="space-y-4 mb-8">
                    <input type="text" id="order-contact" placeholder="@username или Email" class="w-full bg-black/20 border border-white/10 p-5 rounded-2xl text-xs text-white">
                    <textarea id="order-msg" placeholder="Твои пожелания к заказу..." class="w-full bg-black/20 border border-white/10 p-5 rounded-2xl text-xs text-white h-24 resize-none"></textarea>
                </div>
                <button onclick="checkout()" class="w-full bg-white text-black py-6 rounded-2xl font-black text-xs uppercase tracking-widest shadow-2xl active:scale-95 transition-all">Оформить заказ</button>
            </div>
        </section>
    </main>

    <nav class="nav-bar glass">
        <button onclick="switchPage('home')" id="nav-home" class="nav-btn active"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg></button>
        <button onclick="switchPage('ref')" id="nav-ref" class="nav-btn"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/></svg></button>
        <button onclick="switchPage('faq')" id="nav-faq" class="nav-btn"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg></button>
        <button onclick="switchPage('cart')" id="nav-cart" class="nav-btn relative"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg><span id="cart-dot" class="absolute top-2 right-2 w-2 h-2 bg-pink-500 rounded-full hidden"></span></button>
    </nav>

    <script>
        /**
         * НАСТРОЙКИ АДМИНА
         */
        const MY_EMAIL = 'supportnmproda@gmail.com';
        const BOT_USERNAME = 'Boss_storesvzbot';
        
        // Твой список юнитов для топа (Пиши любые имена и количество)
        const CUSTOM_LEADERBOARD = [
            { name: "Cyber_Dragon", units: 142 },
            { name: "Queen_Of_Code", units: 118 },
            { name: "Unit_01", units: 95 },
            { name: "Dark_Matter", units: 74 },
            { name: "Boss_Fan_99", units: 52 }
        ];

        const FAQ_DATA = [
            { q: "Как я получу товар?", a: "После оплаты данные придут в ваш Telegram или Email в течение 10 минут." },
            { q: "Безопасно ли это?", a: "Мы используем официальные шлюзы. Ваши данные полностью защищены." }
        ];

        const tg = window.Telegram.WebApp;
        let items = [], cart = [], activeCat = 'Все';

        window.onload = () => {
            tg.expand();
            const user = tg.initDataUnsafe?.user;
            document.getElementById('user-display').innerText = (user?.first_name || 'ADMIN').toUpperCase();
            document.getElementById('ref-link-box').innerText = `https://t.me/${BOT_USERNAME}?start=${user?.id || '7727345054'}`;
            
            // Автозаполнение контакта
            if(user?.username) {
                document.getElementById('order-contact').value = `@${user.username}`;
            }

            // Почта
            document.getElementById('email-btn').onclick = () => {
                window.location.href = `mailto:${MY_EMAIL}?subject=Support_Request&body=ID:${user?.id || 'Unknown'}`;
            };

            initData();
            renderFAQ();
            renderLeaderboard();
        };

        async function initData() {
            try {
                const url = 'https://docs.google.com/spreadsheets/d/1q9vPlWM9t934ACzIwbZU4_EDtvpJdfO09-jodyIi9Ew/export?format=csv'.trim();
                const res = await fetch(url);
                const text = await res.text();
                const lines = text.split(/\r?\n/).filter(l => l.trim()).slice(1);
                
                items = lines.map(line => {
                    const cols = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    return {
                        cat: cols[0]?.replace(/"/g, '').trim(),
                        name: cols[1]?.replace(/"/g, '').trim(),
                        price: parseFloat(cols[2]),
                        desc: cols[3]?.replace(/"/g, '').trim(),
                        img: cols[4]?.replace(/"/g, '').trim()};
                }).filter(i => i.name && !isNaN(i.price));

                renderCats();
                renderItems(items);
            } catch (err) { console.log(err); }
        }

        function renderCats() {
            const cats = ['Все', ...new Set(items.map(i => i.cat).filter(Boolean))];
            document.getElementById('categories').innerHTML = cats.map(c => `
                <button onclick="filterCat('${c}')" class="cat-chip ${activeCat === c ? 'active' : ''}">${c}</button>
            `).join('');
        }

        function renderItems(data) {
            document.getElementById('catalog').innerHTML = data.map(i => `
                <div onclick="addToCartClick('${i.name}')" class="product-card p-5 flex items-center gap-5">
                    <div class="w-16 h-16 rounded-2xl bg-white/5 overflow-hidden flex-shrink-0">
                        <img src="${i.img}" class="w-full h-full object-cover" onerror="this.src='https://placehold.co/100x100/101015/00f2ff?text=BOSS'">
                    </div>
                    <div class="flex-1">
                        <p class="text-[7px] text-pink-500 font-black font-orb uppercase mb-1">${i.cat}</p>
                        <h3 class="text-xs font-black uppercase tracking-tight">${i.name}</h3>
                        <div class="flex items-center justify-between mt-2">
                            <span class="text-lg font-black font-orb text-cyan-400">${i.price}</span>
                            <span class="text-[8px] bg-white/5 px-2 py-1 rounded-md text-gray-400">В КОРЗИНУ</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function filterCat(c) {
            activeCat = c;
            renderCats();
            renderItems(c === 'Все' ? items : items.filter(i => i.cat === c));
            tg.HapticFeedback.impactOccurred('medium');
        }

        function addToCartClick(name) {
            const it = items.find(x => x.name === name);
            cart.push(it);
            updateCart();
            tg.HapticFeedback.notificationOccurred('success');
            tg.showAlert(`Добавлено: ${name}`);
        }

        function updateCart() {
            const list = document.getElementById('cart-list');
            const footer = document.getElementById('cart-footer');
            const empty = document.getElementById('cart-empty');
            const dot = document.getElementById('cart-dot');

            if(cart.length > 0) {
                list.innerHTML = cart.map((it, i) => `
                    <div class="product-card p-4 flex items-center justify-between border-white/5">
                        <div class="flex items-center gap-4">
                            <span class="text-[10px] font-black uppercase font-orb">${it.name}</span>
                        </div>
                        <button onclick="removeFromCart(${i})" class="text-rose-500 text-[10px] font-black uppercase">Удалить</button>
                    </div>
                `).join('');
                document.getElementById('total-price').innerText = cart.reduce((s, i) => s + i.price, 0);
                footer.classList.remove('hidden'); empty.classList.add('hidden'); dot.classList.remove('hidden');
            } else {
                footer.classList.add('hidden'); empty.classList.remove('hidden'); dot.classList.add('hidden');
            }
        }

        function removeFromCart(i) { cart.splice(i, 1); updateCart(); }

        function switchPage(p) {
            document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
            document.getElementById('page-' + p).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(l => l.classList.remove('active'));
            document.getElementById('nav-' + p).classList.add('active');
            window.scrollTo(0,0);
        }

        function renderLeaderboard() {
            document.getElementById('leaderboard').innerHTML = CUSTOM_LEADERBOARD.map((u, i) => `
                <div class="flex items-center gap-4 p-4 bg-white/5 rounded-2xl mb-2 border border-white/5">
                    <div class="w-6 h-6 rounded-lg bg-cyan-400 text-black font-black flex items-center justify-center text-[10px]">${i+1}</div>
                    <div class="flex-1 text-[10px] font-bold uppercase">${u.name}</div>
                    <div class="text-[10px] font-black text-cyan-400 font-orb">${u.units} UNITS</div>
                </div>
            `).join('');
        }

        function renderFAQ() {
            document.getElementById('faq-list').innerHTML = FAQ_DATA.map(f => `
                <div class="product-card p-6" onclick="this.querySelector('p').classList.toggle('hidden')">
                    <div class="flex justify-between items-center text-[10px] font-black uppercase font-orb">
                        <span>${f.q}</span>
                        <svg class="w-4 h-4 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7"/></svg>
                    </div>
                    <p class="mt-4 text-[10px] text-gray-500 leading-relaxed hidden border-t border-white/5 pt-4 font-mono">${f.a}</p>
                </div>
            `).join('');
        }

        function checkout() {
            const contact = document.getElementById('order-contact').value;
            if(!contact) return tg.showAlert("Заполни контакт!");
            
            confetti({ particleCount: 150, spread: 70, colors: ['#00f2ff', '#ff007f'] });
            
            const msg = `🛒 НОВЫЙ ЗАКАЗ\n👤 Клиент: @${tg.initDataUnsafe?.user?.username || 'ID:'+tg.initDataUnsafe?.user?.id}\n💰 Сумма: ${document.getElementById('total-price').innerText}\n📍 Контакт: ${contact}\n📝 Пожелания: ${document.getElementById('order-msg').value}\n📦 Товары:\n` + cart.map(i => `- ${i.name}`).join('\n');
            
            tg.sendData(JSON.stringify({ message: msg }));
            setTimeout(() => window.location.href = 'https://t.me/nmproda', 2000);
        }

        function copyRef() {
            navigator.clipboard.writeText(document.getElementById('ref-link-box').innerText);
            tg.showAlert("Ссылка скопирована!");
        }

        function toggleTheme() {
            const curr = document.documentElement.getAttribute('data-theme');
            const next = curr === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            document.getElementById('theme-icon').innerHTML = next === 'light' ? 
                '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>' : 
                '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m0-12.728l.707.707m12.728 12.728l.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z"/>';
        }

        function toggleLang() {
            const btn = document.getElementById('lang-btn');
            btn.innerText = btn.innerText === 'RU' ? 'EN' : 'RU';
        }

        document.getElementById('search').oninput = (e) => {
            const v = e.target.value.toLowerCase();
            renderItems(items.filter(i => i.name.toLowerCase().includes(v)));
        };
    </script>
</body>
</html>

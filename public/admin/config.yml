        backend:
          name: git-gateway
          branch: main # Убедитесь, что это ваша основная ветка (main или master)

        publish_mode: editorial_workflow # Режим для черновиков и публикаций

        media_folder: "public/uploads"
        public_folder: "/uploads"

        collections:
          - name: "products"
            label: "Товары"
            folder: "src/content/products"
            create: true
            slug: "{{slug}}"
            fields:
              - {label: "Заголовок", name: "title", widget: "string", required: true}
              - {label: "Slug", name: "slug", widget: "string", required: true, pattern: ["^[a-z0-9]+(?:-[a-z0-9]+)*$", "Please use only letters, numbers, and hyphens for the slug."]}
              - {label: "Изображение", name: "image", widget: "image", required: false}
              - {label: "Описание", name: "description", widget: "markdown", required: true}
              - {label: "Цена (RUB)", name: "price_rub", widget: "number", value_type: "float", min: 0, step: 0.01, required: true}
              - {label: "Цена (USD)", name: "price_usd", widget: "number", value_type: "float", min: 0, step: 0.01, required: false}
              - {label: "Категория", name: "category", widget: "string", required: true}
              - {label: "Опубликовано", name: "published", widget: "boolean", default: true}
              - {label: "Дата публикации", name: "date", widget: "datetime", required: false}
